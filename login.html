<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>login</h2>
    <form action="" method="post">
    <div>
        <label for="nama">Nama</label>
        <input type="text" id="nama" name="nama" placeholder="Masukan Nama">
    </div>

    <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Masukan Email">
    </div>

    <div>
        <label for="password">Password</label>
        <input type="Password" id="password" name="password" placeholder="Masukan Password">
    </div>

    <div>
        <label for="jk">Jenis Kelamin</label>
        <input type="radio" name="jk" id="laki" value="laki">
        <label for="laki">Laki-laki</label>
        <input type="radio" name="jk" id="perempuan" value="perempuan">
        <label for="perempuan">Perempuan</label>
    </div>

    <button type="submit">Submit</button>
    <button disabled="disabled">Disabled</button>
    <button type="reset">Reset</button>
    </form>
</body>
</html>
